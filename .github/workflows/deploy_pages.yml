name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4          # ✅ v4

      - name: Setup Pages
        uses: actions/configure-pages@v5   # ✅ v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3  # ✅ v3 (celui-ci est correct)
        with:
          path: './site_vitrine'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4      # ✅ v4
